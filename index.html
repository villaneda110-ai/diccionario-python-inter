<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Master App - Nivel Dios</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<style>
body{margin:0;font-family:Arial;background:#020617;color:white}
header{background:#0f172a;padding:15px;text-align:center}
.container{padding:20px}
.card{background:#0f172a;margin:10px 0;padding:15px;border-radius:12px}
input,select,textarea{padding:10px;margin:5px;border-radius:8px;border:none;width:100%}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.run{background:#22c55e}
.ai{background:#38bdf8}
.save{background:#facc15}
</style>
</head>
<body>
<header>
<h1>🔥 Python Master App - Nivel Dios</h1>
<p>IA + Ejecución + Progreso + App Instalable</p>
</header>
<div class="container">

<h2>🔐 Usuario</h2>
<input id="user" placeholder="Ingresa tu nombre">
<button onclick="saveUser()">Guardar</button>
<p id="welcome"></p>

<h2>📘 Diccionario</h2>
<input id="search" placeholder="Buscar término...">
<div id="results"></div>

<h2>💻 Editor</h2>
<textarea id="editor">print("Hola nivel dios")</textarea>
<button class="run" onclick="runCode()">▶ Ejecutar</button>
<pre id="output"></pre>

<h2>🧪 Progreso</h2>
<button class="save" onclick="saveProgress()">Guardar progreso</button>
<p id="progress"></p>

</div>

<script>
let pyodide;
async function init(){pyodide=await loadPyodide();}
init();

const data=[
{term:"append()",def:"Agrega elemento"},
{term:"for",def:"Bucle"},
{term:"dict",def:"Diccionario"}
];

function render(){
results.innerHTML="";
const s=search.value.toLowerCase();
data.filter(x=>x.term.includes(s))
.forEach(x=>{
results.innerHTML+=`
<div class="card">
<h3>${x.term}</h3>
<p>${x.def}</p>
<button class="ai" onclick="aiExplain('${x.term}')">🤖 IA</button>
</div>`;
});
}

async function runCode(){
try{
let r=await pyodide.runPythonAsync(editor.value);
output.innerText=r||"✔ Ejecutado";
}catch(e){output.innerText=e;}
}

function aiExplain(term){
alert("IA explicando: "+term+"\n(Conecta API real aquí)");
}

function saveUser(){
localStorage.setItem("user",user.value);
welcome.innerText="Bienvenido "+user.value;
}

function saveProgress(){
localStorage.setItem("code",editor.value);
progress.innerText="Progreso guardado ✔";
}

window.onload=()=>{
if(localStorage.getItem("user")){
welcome.innerText="Bienvenido "+localStorage.getItem("user");
}
if(localStorage.getItem("code")){
editor.value=localStorage.getItem("code");
}
render();
};

search.oninput=render;

// PWA básico
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
